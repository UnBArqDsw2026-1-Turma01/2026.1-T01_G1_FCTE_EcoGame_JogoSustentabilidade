site_name: G1 - JogoSustentabilidade
site_description: Projeto G1_JogoSustentabilidade - Desenho de Software
site_url: ""

theme:
  name: material
  language: pt
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch
        name: Dark mode
      primary: green
      accent: light green
    - scheme: slate
      toggle:
        icon: material/toggle-switch-off-outline
        name: Light mode
      primary: green
      accent: light green

markdown_extensions:
  - attr_list
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - custom.css

nav:
  - Home: index.md
  - Dinâmica I:
    - Design Sprint:
      - Visão Geral: dinamica-1/design-sprint/visao-geral.md
      - Entender: dinamica-1/design-sprint/entender.md
      - Esboçar: dinamica-1/design-sprint/esbocar.md
      - Decidir: dinamica-1/design-sprint/decidir.md
      - Prototipar: dinamica-1/design-sprint/prototipar.md
    - Pré-Rastreabilidade:
      - Visão Geral: dinamica-1/pre-rastreabilidade/visao-geral.md
      - Rich Pictures: dinamica-1/pre-rastreabilidade/rich-pictures.md
      - 5W2H: dinamica-1/pre-rastreabilidade/5w2h.md
      - Argumentações: dinamica-1/pre-rastreabilidade/argumentacoes.md
    - Elicitação:
      - Visão Geral: dinamica-1/elicitacao/visao-geral.md
      - Brainstorming: dinamica-1/elicitacao/brainstorming.md
      - Análise de Protocolo: dinamica-1/elicitacao/analise-protocolo.md
      - Análise de Discurso: dinamica-1/elicitacao/analise-discurso.md
      - Entrevistas: dinamica-1/elicitacao/entrevistas.md
      - Questionário: dinamica-1/elicitacao/questionario.md
      - Storytelling: dinamica-1/elicitacao/storytelling.md
      - Léxicos: dinamica-1/elicitacao/lexicos.md
    - Priorização:
      - Visão Geral: dinamica-1/priorizacao/visao-geral.md
      - MoSCoW: dinamica-1/priorizacao/moscow.md
      - First Things First: dinamica-1/priorizacao/first-things-first.md
  - Dinâmica II:
    - Metodologia e Definições: dinamica-2/metodologia-definicoes.md
    - Modelagem do Processo: dinamica-2/modelagem-processo.md
    - Gerenciamento de Riscos: dinamica-2/gerenciamento-riscos.md
    - Monitoramento e Controle de Riscos: dinamica-2/monitoramento-riscos.md
    - Documento de Visão: dinamica-2/documento-visao.md
  - Dinâmica III:
    - NFR Framework: dinamica-3/nfr-framework.md
    - iStar: dinamica-3/istar.md
  - Dinâmica IV:
    - Documento de Arquitetura: dinamica-4/documento-arquitetura.md
    - Padrões de Projeto: dinamica-4/padroes-projeto.md
  - Extras:
    - Plano de Comunicação: extras/plano-comunicacao.md
    - Guia de Contribuição: extras/guia-contribuicao.md
    - Reuniões: extras/reunioes.md
    - Protótipo: extras/prototipo.md
    - Referência Bibliográfica: extras/referencia-bibliografica.md
    - Sprints do Projeto: extras/sprints-projeto.md

plugins:
  - search:
      lang: pt
